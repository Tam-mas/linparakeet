name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test deps only
        # The full requirements pull in NeMo/PyTorch (multi-GB). The pure-logic
        # tests stub heavy modules, so CI only needs pytest + ruff.
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff

      - name: Lint
        run: ruff check app main.py tests

      - name: Test
        run: pytest -q
